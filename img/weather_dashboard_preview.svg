<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="title desc">
  <title id="title">Weather Dashboard Preview</title>
  <desc id="desc">A stylized weather dashboard preview with temperature, forecast cards, and chart lines.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f1729"/>
      <stop offset="0.52" stop-color="#1e3a8a"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <circle cx="636" cy="124" r="74" fill="#facc15" filter="url(#glow)"/>
  <circle cx="666" cy="110" r="72" fill="#1e3a8a"/>
  <g fill="url(#card)" stroke="#bfdbfe" stroke-opacity="0.28">
    <rect x="64" y="58" width="672" height="384" rx="34"/>
    <rect x="104" y="110" width="266" height="132" rx="24"/>
    <rect x="104" y="278" width="132" height="108" rx="22"/>
    <rect x="264" y="278" width="132" height="108" rx="22"/>
    <rect x="424" y="278" width="132" height="108" rx="22"/>
    <rect x="584" y="278" width="92" height="108" rx="22"/>
  </g>
  <text x="126" y="158" fill="#e0f2fe" font-family="Arial, sans-serif" font-size="34" font-weight="700">Can Tho</text>
  <text x="126" y="214" fill="#ffffff" font-family="Arial, sans-serif" font-size="70" font-weight="700">29°C</text>
  <text x="124" y="332" fill="#bae6fd" font-family="Arial, sans-serif" font-size="26" font-weight="700">MON</text>
  <text x="284" y="332" fill="#bae6fd" font-family="Arial, sans-serif" font-size="26" font-weight="700">TUE</text>
  <text x="444" y="332" fill="#bae6fd" font-family="Arial, sans-serif" font-size="26" font-weight="700">WED</text>
  <text x="606" y="332" fill="#bae6fd" font-family="Arial, sans-serif" font-size="26" font-weight="700">THU</text>
  <text x="128" y="364" fill="#ffffff" font-family="Arial, sans-serif" font-size="30" font-weight="700">31°</text>
  <text x="288" y="364" fill="#ffffff" font-family="Arial, sans-serif" font-size="30" font-weight="700">28°</text>
  <text x="448" y="364" fill="#ffffff" font-family="Arial, sans-serif" font-size="30" font-weight="700">30°</text>
  <text x="610" y="364" fill="#ffffff" font-family="Arial, sans-serif" font-size="30" font-weight="700">27°</text>
  <path d="M438 186 C492 132 548 246 612 174" fill="none" stroke="#67e8f9" stroke-width="10" stroke-linecap="round"/>
  <path d="M438 224 C500 190 548 282 626 226" fill="none" stroke="#a78bfa" stroke-width="10" stroke-linecap="round"/>
  <text x="400" y="76" fill="#dbeafe" font-family="Arial, sans-serif" font-size="30" font-weight="700">Weather Dashboard</text>
</svg>
